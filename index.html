<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Phát Âm Tiếng Trung</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fc;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        /* Định dạng riêng cho tên tác giả nếu cần */
        .author {
            font-size: 18px;
            color: #555;
            text-align: center;
            font-weight: normal;
            margin-bottom: 5px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,.1);
        }

        h1 {
            text-align: center;
            color: #d32f2f;
            margin-top: 5px;
        }

        .hanzi {
            font-size: 42px;
            text-align: center;
            color: #d32f2f;
            margin-top: 20px;
        }

        .pinyin {
            text-align: center;
            font-size: 24px;
            color: #1976d2;
            margin-top: 10px;
        }

        .meaning {
            text-align: center;
            font-size: 20px;
            color: #666;
            margin-top: 10px;
        }

        .buttons {
            text-align: center;
            margin-top: 25px;
        }

        button {
            margin: 5px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .listen { background: #2196f3; color: white; }
        .record { background: #4caf50; color: white; }
        .stop { background: #f44336; color: white; }
        .next { background: #ff9800; color: white; }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .score {
            font-size: 26px;
            font-weight: bold;
            color: #4caf50;
        }
    </style>
</head>
<body>

<div class="container">

    <h1 class="author">Lâm Huỳnh Thảo Trang</h1>
    <h1>🇨🇳 Luyện Phát Âm Tiếng Trung</h1>

    <div class="hanzi" id="hanzi"></div>
    <div class="pinyin" id="pinyin"></div>
    <div class="meaning" id="meaning"></div>

    <div class="buttons">
        <button class="listen" onclick="speakChinese()">🔊 Nghe mẫu</button>
        <button class="record" onclick="startRecognition()">🎤 Bắt đầu đọc</button>
        <button class="stop" onclick="stopRecognition()">⏹ Dừng</button>
        <button class="next" onclick="nextWord()">➡️ Từ tiếp theo</button>
    </div>

    <div class="result">
        <h3>Kết quả nhận diện:</h3>
        <p id="recognized">Chưa có dữ liệu</p>

        <h3>Độ chính xác:</h3>
        <div class="score" id="score">0%</div>
    </div>

</div>

<script>
const vocabulary = [
    { hanzi: "你好", pinyin: "Nǐ hǎo", meaning: "Xin chào" },
    { hanzi: "谢谢", pinyin: "Xiè xie", meaning: "Cảm ơn" },
    { hanzi: "再见", pinyin: "Zài jiàn", meaning: "Tạm biệt" },
    { hanzi: "对不起", pinyin: "Duì bu qǐ", meaning: "Xin lỗi" },
    { hanzi: "没关系", pinyin: "Méi guān xi", meaning: "Không sao" },
    { hanzi: "我是学生", pinyin: "Wǒ shì xué shēng", meaning: "Tôi là học sinh" },
    { hanzi: "老师好", pinyin: "Lǎo shī hǎo", meaning: "Chào giáo viên" },
    { hanzi: "我爱你", pinyin: "Wǒ ài nǐ", meaning: "Tôi yêu bạn" }
];

let currentIndex = 0;

function loadWord() {
    document.getElementById("hanzi").innerText = vocabulary[currentIndex].hanzi;
    document.getElementById("pinyin").innerText = vocabulary[currentIndex].pinyin;
    document.getElementById("meaning").innerText = vocabulary[currentIndex].meaning;
    document.getElementById("recognized").innerText = "Chưa có dữ liệu";
    document.getElementById("score").innerText = "0%";
}

function nextWord() {
    currentIndex++;
    if (currentIndex >= vocabulary.length) {
        currentIndex = 0;
    }
    loadWord();
}

function speakChinese() {
    const utterance = new SpeechSynthesisUtterance(vocabulary[currentIndex].hanzi);
    utterance.lang = "zh-CN";
    utterance.rate = 0.9;
    speechSynthesis.speak(utterance);
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "zh-CN";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = function(event) {
        const spoken = event.results[0][0].transcript;
        document.getElementById("recognized").innerText = spoken;
        calculateScore(vocabulary[currentIndex].hanzi, spoken);
    };

    recognition.onerror = function(event) {
        document.getElementById("recognized").innerText = "Lỗi: " + event.error;
    };
}

function startRecognition() {
    if (!recognition) {
        alert("Trình duyệt không hỗ trợ nhận diện giọng nói.");
        return;
    }
    recognition.start();
}

function stopRecognition() {
    if (recognition) {
        recognition.stop();
    }
}

function calculateScore(target, spoken) {
    target = target.replace(/\s/g, "");
    spoken = spoken.replace(/\s/g, "");
    
    let same = 0;
    for (let i = 0; i < Math.min(target.length, spoken.length); i++) {
        if (target[i] === spoken[i]) {
            same++;
        }
    }
    
    let score = Math.round((same / target.length) * 100);
    document.getElementById("score").innerText = score + "%";
}

// Khởi tạo từ đầu tiên khi tải trang
loadWord();
</script>

</body>
</html>
